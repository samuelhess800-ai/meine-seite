<style>
  #tegla-wrap {
    --moos: #2F4538;
    --moos-hell: #4A6655;
    --terrakotta: #C1652F;
    --bernstein: #C99A45;
    --schiefer: #5C6B70;
    --lehm: #8C5A3C;
    --tinte: #1F2A24;
    --papier: #F6F3EC;
    --linie: #E2DCCB;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--papier);
    border-radius: 14px;
    padding: 18px 18px 14px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04) inset, 0 18px 40px -20px rgba(31,42,36,0.35);
    border: 1px solid var(--linie);
    margin: 20px 0;
  }
  #tegla-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  #tegla-head h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 21px;
    color: var(--tinte);
    margin: 0;
    letter-spacing: 0.1px;
  }
  #tegla-head span {
    font-size: 12.5px;
    color: var(--schiefer);
  }
  #tegla-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .tegla-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 11px 5px 8px;
    border-radius: 100px;
    border: 1px solid var(--linie);
    background: #fff;
    color: var(--tinte);
    cursor: pointer;
    user-select: none;
    transition: transform .12s ease, box-shadow .12s ease, opacity .15s ease;
  }
  .tegla-chip:hover { transform: translateY(-1px); box-shadow: 0 4px 10px -4px rgba(0,0,0,0.25); }
  .tegla-chip.off { opacity: 0.38; }
  .tegla-chip .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .tegla-chip .count { color: var(--schiefer); font-weight: 400; }

  #tegla-referenzkarte {
    width: 100% !important;
    height: 650px !important;
    min-height: 650px !important;
    border-radius: 10px;
    overflow: hidden;
    z-index: 10;
    display: block !important;
    border: 1px solid var(--linie);
    background: #EDEAE1;
  }

  /* Custom marker pin */
  .tegla-pin {
    position: relative;
    width: 30px;
    height: 40px;
    transform: translate(-15px, -38px);
    filter: drop-shadow(0 3px 4px rgba(20,20,15,0.35));
    transition: transform .15s ease;
  }
  .tegla-pin:hover { transform: translate(-15px, -38px) scale(1.08); }
  .tegla-pin svg { display: block; }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    border-radius: 12px;
    box-shadow: 0 14px 30px -10px rgba(20,20,15,0.4);
    border: 1px solid var(--linie);
  }
  .leaflet-popup-tip { box-shadow: none; }
  .tegla-popup { font-family: 'Inter', sans-serif; min-width: 200px; }
  .tegla-popup .kat {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .tegla-popup .kat .dot { width: 7px; height: 7px; border-radius: 50%; }
  .tegla-popup h3 {
    margin: 0 0 6px 0;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15.5px;
    color: var(--tinte);
    line-height: 1.25;
  }
  .tegla-popup p {
    margin: 0;
    font-size: 12.5px;
    color: #4a5258;
    line-height: 1.55;
  }
  .tegla-popup p b { color: var(--tinte); font-weight: 600; }

  .leaflet-control-zoom a {
    border-radius: 8px !important;
    color: var(--moos) !important;
  }
  .leaflet-control-attribution {
    background: rgba(246,243,236,0.85) !important;
    border-radius: 6px 0 0 0;
    font-size: 10.5px !important;
  }

  #tegla-reset {
    position: absolute;
    z-index: 5;
    bottom: 10px;
    right: 10px;
    background: #fff;
    border: 1px solid var(--linie);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--moos);
    padding: 7px 12px;
    cursor: pointer;
    box-shadow: 0 4px 10px -4px rgba(0,0,0,0.2);
  }
  #tegla-mapholder { position: relative; }
</style>

<div id="tegla-wrap">

    {coords: [52.5392, 13.3473], titel: "Robert-Koch-Institut Berlin", infos: "<b>Adresse:</b> Nordufer 20, 13353 Berlin"},
    {coords: [52.2610, 13.2350], titel: "Windpark Ruhlsdorf", infos: "<b>Bereich:</b> Zuwegung & Kranstellflächen"},
    {coords: [52.3090, 13.2620], titel: "Neubau Grundschule Albert-Schweitzer-Straße", infos: "<b>Adresse:</b> Ludwigsfelde"},
    {coords: [52.3520, 13.5110], titel: "Gymnasium Schönefeld", infos: "<b>Projekt:</b> Schulhof- und Sportfreianlagen"},
    {coords: [52.2140, 13.1530], titel: "Grundschule Blankensee", infos: "<b>Projekt:</b> Außenanlagen ländlicher Schulstandort"},
    {coords: [52.6210, 13.0120], titel: "Julius-Kühn-Institut", infos: "<b>Adresse:</b> Berlin / Kleinmachnow"}
  ];

  // Kategorie zuordnen + Marker bauen
  var markerLayers = {};
  Object.keys(KATEGORIEN).forEach(function(k){ markerLayers[k] = []; });

  var bounds = L.latLngBounds();
  projekte.forEach(function(p) {
    var kat = kategorisiere(p);
    var k = KATEGORIEN[kat];
    var content = '<div class="tegla-popup">' +
        '<div class="kat" style="color:' + k.color + '"><span class="dot" style="background:' + k.color + '"></span>' + k.label + '</div>' +
        '<h3>' + p.titel + '</h3><p>' + p.infos + '</p></div>';
    var marker = L.marker(p.coords, { icon: pinIcon(kat) }).bindPopup(content, { maxWidth: 320 });
    marker.addTo(map);
    markerLayers[kat].push(marker);
    bounds.extend(p.coords);
  });

  document.getElementById('tegla-count-label').textContent = projekte.length + ' Standorte';

  // Legende erzeugen
  var legendEl = document.getElementById('tegla-legend');
  var aktiv = {};
  Object.keys(KATEGORIEN).forEach(function(kat){
    aktiv[kat] = true;
    var k = KATEGORIEN[kat];
    var n = markerLayers[kat].length;
    if (n === 0) return;
    var chip = document.createElement('div');
    chip.className = 'tegla-chip';
    chip.innerHTML = '<span class="dot" style="background:' + k.color + '"></span>' + k.label + ' <span class="count">' + n + '</span>';
    chip.addEventListener('click', function(){
      aktiv[kat] = !aktiv[kat];
      chip.classList.toggle('off', !aktiv[kat]);
      markerLayers[kat].forEach(function(m){
        if (aktiv[kat]) { if(!map.hasLayer(m)) m.addTo(map); }
        else { map.removeLayer(m); }
      });
    });
    legendEl.appendChild(chip);
  });

  document.getElementById('tegla-reset').addEventListener('click', function(){
    map.fitBounds(bounds, { padding: [40, 40] });
  });

  setTimeout(function() {
    map.fitBounds(bounds, { padding: [40, 40] });
    map.invalidateSize();
  }, 300);
}
initTeglaMap();
</script>
